<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Crawler</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        form {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            background: #0066cc;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover:not(:disabled) {
            background: #0055aa;
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .api-key-help {
            font-size: 0.85em;
            color: #666;
            margin-top: -10px;
            margin-bottom: 15px;
        }

        .api-key-help a {
            color: #0066cc;
        }

        #results {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            max-height: 500px;
            overflow: auto;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .event {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 4px;
        }

        .event.document {
            background: #264f36;
        }

        .event.error {
            background: #5a1d1d;
        }

        .event.done {
            background: #1d3a5a;
        }
    </style>
</head>

<body>
    <h1>🕷️ Shared Crawler</h1>
    <form id="crawlForm">
        <label for="url">URL to crawl</label>
        <input type="url" id="url" name="url" placeholder="https://example.com/docs" required>

        <label for="depth">Depth</label>
        <input type="number" id="depth" name="depth" value="1" min="0" max="3">

        <label for="strategy">Strategy</label>
        <select id="strategy" name="strategy">
            <option value="links">Links (all hyperlinks)</option>
            <option value="path">Path (same path only)</option>
        </select>

        <label for="async">Async Mode</label>
        <select id="async" name="async">
            <option value="none">None (wait for all)</option>
            <option value="links">Links (linked items are saved but not streamed)</option>
            <option value="all">All (immediate response, no pages returned)</option>
        </select>

        <label for="format">Response Format</label>
        <select id="format" name="format">
            <option value="text/event-stream">SSE Stream</option>
            <option value="application/json">JSON</option>
            <option value="text/markdown">Markdown</option>
        </select>

        <label for="apiKey">Parallel API Key</label>
        <input type="password" id="apiKey" name="apiKey" placeholder="Your API key">
        <p class="api-key-help">
            Don't have an API key? <a href="https://platform.parallel.ai/settings?tab=api-keys" target="_blank"
                rel="noopener">Get one here →</a>
        </p>

        <button type="submit" id="submitBtn">Crawl</button>
    </form>

    <div id="results"></div>

    <script>
        const form = document.getElementById('crawlForm');
        const results = document.getElementById('results');
        const apiKeyInput = document.getElementById('apiKey');
        const submitBtn = document.getElementById('submitBtn');
        const API_KEY_STORAGE_KEY = 'parallel_api_key';

        // Load API key from localStorage on page load
        const savedApiKey = localStorage.getItem(API_KEY_STORAGE_KEY);
        if (savedApiKey) {
            apiKeyInput.value = savedApiKey;
        }

        // Save API key to localStorage when it changes
        apiKeyInput.addEventListener('change', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem(API_KEY_STORAGE_KEY, key);
            } else {
                localStorage.removeItem(API_KEY_STORAGE_KEY);
            }
        });

        let isCrawling = false;

        function setFormDisabled(disabled) {
            isCrawling = disabled;
            submitBtn.disabled = disabled;
            submitBtn.textContent = disabled ? 'Crawling...' : 'Crawl';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (isCrawling) return;

            setFormDisabled(true);
            results.innerHTML = 'Starting crawl...\n';

            const url = document.getElementById('url').value;
            const depth = parseInt(document.getElementById('depth').value);
            const strategy = document.getElementById('strategy').value;
            const asyncMode = document.getElementById('async').value;
            const format = document.getElementById('format').value;
            const apiKey = apiKeyInput.value.trim();

            // Save API key if provided
            if (apiKey) {
                localStorage.setItem(API_KEY_STORAGE_KEY, apiKey);
            }

            const headers = {
                'Content-Type': 'application/json',
                'Accept': format
            };
            if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;

            try {
                if (format === 'text/event-stream') {
                    const response = await fetch('/crawl', {
                        method: 'POST',
                        headers,
                        body: JSON.stringify({ url, options: { depth, strategy, async: asyncMode } })
                    });

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';

                        let currentEvent = '';
                        for (const line of lines) {
                            if (line.startsWith('event: ')) {
                                currentEvent = line.slice(7);
                            } else if (line.startsWith('data: ')) {
                                const data = JSON.parse(line.slice(6));
                                const div = document.createElement('div');
                                div.className = `event ${currentEvent}`;
                                if (currentEvent === 'document') {
                                    div.textContent = `✓ ${data.url} (${data.source}, ${data.content.length} chars)`;
                                } else if (currentEvent === 'error') {
                                    div.textContent = `✗ ${data.url}: ${data.error}`;
                                } else if (currentEvent === 'done') {
                                    div.textContent = `Done! Total: ${data.total} pages`;
                                }
                                results.appendChild(div);
                                results.scrollTop = results.scrollHeight;
                            }
                        }
                    }
                } else {
                    const response = await fetch('/crawl', {
                        method: 'POST',
                        headers,
                        body: JSON.stringify({ url, options: { depth, strategy, async: asyncMode } })
                    });
                    const text = await response.text();
                    results.textContent = text;
                }
            } catch (error) {
                const div = document.createElement('div');
                div.className = 'event error';
                div.textContent = `Error: ${error.message}`;
                results.appendChild(div);
            } finally {
                setFormDisabled(false);
            }
        });
    </script>
</body>

</html>
